backend:
  name: github
  repo: my-ships-it/mikeyerke-site
  branch: main
  base_url: https://www.mikeyerke.com
  auth_endpoint: api/cms/auth
  site_domain: www.mikeyerke.com

media_folder: public/uploads
public_folder: /uploads

site_url: https://www.mikeyerke.com
logo_url: /favicon.ico

collections:
  - name: blog
    label: Blog
    folder: content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: summary, label: Summary, widget: text }
      - { name: tags, label: Tags, widget: list }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: projects
    label: Projects
    folder: content/projects
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: summary, label: Summary, widget: text }
      - { name: tags, label: Tags, widget: list }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: coverImage, label: Cover Image Path, widget: string, required: false }
      - name: visuals
        label: Visual Gallery
        widget: list
        required: false
        fields:
          - { name: src, label: Image Path, widget: string }
          - { name: alt, label: Alt Text, widget: string }
          - { name: caption, label: Caption, widget: string, required: false }
      - { name: role, label: Role, widget: string, required: false }
      - { name: timeline, label: Timeline, widget: string, required: false }
      - { name: team, label: Team, widget: string, required: false }
      - name: stakeholders
        label: Stakeholder Map
        widget: list
        required: false
      - name: tradeoffs
        label: Decision Tradeoffs
        widget: list
        required: false
      - name: governance
        label: Governance Model
        widget: list
        required: false
      - name: rollout
        label: Rollout Plan
        widget: list
        required: false
      - name: adoption
        label: Adoption Strategy
        widget: list
        required: false
      - name: before
        label: Before (Problems)
        widget: list
        required: false
      - name: after
        label: After (System State)
        widget: list
        required: false
      - name: impact
        label: Impact Metrics
        widget: list
        required: false
        fields:
          - { name: label, label: Label, widget: string }
          - { name: value, label: Value, widget: string }
          - { name: detail, label: Detail, widget: string, required: false }
          - { name: metric_period, label: Metric Period, widget: string }
          - { name: baseline, label: Baseline, widget: string }
          - { name: delta, label: Delta, widget: string }
          - { name: source_artifact_url, label: Source Artifact URL, widget: string }
          - name: confidence_level
            label: Confidence Level
            widget: select
            options:
              - { label: High (fully audited), value: high }
              - { label: Medium (validated sample), value: medium }
              - { label: Directional (pilot signal), value: directional }
      - { name: repo, label: Repo URL, widget: string, required: false }
      - { name: demo, label: Demo URL, widget: string, required: false }
      - { name: body, label: Body, widget: markdown }
